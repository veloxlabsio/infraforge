name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "k8s/**"
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # Gate 1: Lint all K8s manifests
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate K8s manifests
        run: |
          find k8s/apps -name '*.yaml' | xargs kubeconform -strict -summary

  # Gate 2: Security scan source code BEFORE build
  security-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [fastapi-demo]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e0f18c8eab2c30fc # v0.28.0
        with:
          scan-type: fs
          scan-ref: apps/${{ matrix.app }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  # Gate 3: Build image (only after lint + scan pass)
  build:
    runs-on: ubuntu-latest
    needs: [lint, security-scan]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app:
          - name: fastapi-demo
            context: apps/fastapi-demo
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        env:
          GIT_SHA: ${{ github.sha }}
        run: echo "tag=$(echo "${GIT_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c3bc3c73 # v6.18.0
        with:
          context: ${{ matrix.app.context }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app.name }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Gate 4: Scan built image for CVEs
  image-scan:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        app: [fastapi-demo]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e0f18c8eab2c30fc # v0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}:${{ needs.build.outputs.image-tag }}
          format: table
          exit-code: 1
          severity: CRITICAL

  # Gate 5: Update manifest only after ALL gates pass
  deploy:
    runs-on: ubuntu-latest
    needs: [build, image-scan]
    if: github.event_name == 'push'
    permissions:
      contents: write
    strategy:
      matrix:
        app: [fastapi-demo]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Update deployment manifest
        env:
          GIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          APP_NAME: ${{ matrix.app }}
        run: |
          SHORT_SHA=$(echo "${GIT_SHA}" | cut -c1-7)
          IMAGE="${REGISTRY}/${REPO}/${APP_NAME}:${SHORT_SHA}"
          sed -i "s|image: .*|image: ${IMAGE}|" "k8s/apps/${APP_NAME}/deployment.yaml"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "k8s/apps/${APP_NAME}/deployment.yaml"
          git diff --cached --quiet || git commit -m "Deploy ${APP_NAME}:${SHORT_SHA}"
          git push
