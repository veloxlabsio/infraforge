name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "k8s/**"
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # Gate 1: Lint all K8s manifests
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate K8s manifests
        run: |
          find k8s/apps -name '*.yaml' | xargs kubeconform -strict -ignore-missing-schemas -summary

  # Gate 2: Security scan source code BEFORE build
  security-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [fastapi-demo]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: apps/${{ matrix.app }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  # Gate 3: Build image (only after lint + scan pass)
  build:
    runs-on: ubuntu-latest
    needs: [lint, security-scan]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app:
          - name: fastapi-demo
            context: apps/fastapi-demo
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        env:
          GIT_SHA: ${{ github.sha }}
        run: echo "tag=$(echo "${GIT_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.app.context }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app.name }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Gate 4: Scan built image for CVEs
  image-scan:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        app: [fastapi-demo]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}:${{ needs.build.outputs.image-tag }}
          format: table
          exit-code: 1
          severity: CRITICAL

  # Gate 5: Update manifest only after ALL gates pass
  deploy:
    runs-on: ubuntu-latest
    needs: [build, image-scan]
    if: github.event_name == 'push'
    permissions:
      contents: write
    strategy:
      matrix:
        app: [fastapi-demo]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Update deployment manifest
        env:
          GIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          APP_NAME: ${{ matrix.app }}
        run: |
          SHORT_SHA=$(echo "${GIT_SHA}" | cut -c1-7)
          IMAGE="${REGISTRY}/${REPO}/${APP_NAME}:${SHORT_SHA}"
          sed -i "s|image: .*|image: ${IMAGE}|" "k8s/apps/${APP_NAME}/deployment.yaml"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "k8s/apps/${APP_NAME}/deployment.yaml"
          git diff --cached --quiet || git commit -m "Deploy ${APP_NAME}:${SHORT_SHA}"
          git push
