name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        app:
          - name: fastapi-demo
            context: apps/fastapi-demo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.app.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.app.context }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update deployment manifest
        if: github.event_name == 'push'
        env:
          GIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          APP_NAME: ${{ matrix.app.name }}
        run: |
          SHORT_SHA=$(echo "${GIT_SHA}" | cut -c1-7)
          IMAGE="${REGISTRY}/${REPO}/${APP_NAME}:${SHORT_SHA}"
          sed -i "s|image: .*|image: ${IMAGE}|" "k8s/apps/${APP_NAME}/deployment.yaml"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "k8s/apps/${APP_NAME}/deployment.yaml"
          git diff --cached --quiet || git commit -m "Deploy ${APP_NAME}:${SHORT_SHA}"
          git push

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read
      security-events: write

    strategy:
      matrix:
        app: [fastapi-demo]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: apps/${{ matrix.app }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  lint-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate K8s manifests
        run: |
          find k8s/apps -name '*.yaml' | xargs kubeconform -strict -summary
