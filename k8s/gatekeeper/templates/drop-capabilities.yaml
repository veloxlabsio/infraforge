apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdropcapabilities
spec:
  crd:
    spec:
      names:
        kind: K8sDropCapabilities
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdropcapabilities

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not has_drop_all(container)
          msg := sprintf("Container '%v' must drop ALL capabilities (securityContext.capabilities.drop: ['ALL'])", [container.name])
        }

        has_drop_all(container) {
          dropped := {c | c := container.securityContext.capabilities.drop[_]}
          dropped["ALL"]
        }
