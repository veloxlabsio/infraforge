apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: microservice-composition
  labels:
    platform: veloxlabs
spec:
  compositeTypeRef:
    apiVersion: platform.veloxlabs.dev/v1alpha1
    kind: XMicroservice
  mode: Pipeline
  pipeline:
    - step: create-deployment
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: deployment
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: kubernetes-provider
                forProvider:
                  manifest:
                    apiVersion: apps/v1
                    kind: Deployment
                    metadata:
                      namespace: apps
                    spec:
                      selector:
                        matchLabels:
                          app: ""
                      template:
                        metadata:
                          labels:
                            app: ""
                        spec:
                          securityContext:
                            runAsNonRoot: true
                            seccompProfile:
                              type: RuntimeDefault
                          containers:
                            - name: app
                              securityContext:
                                allowPrivilegeEscalation: false
                                capabilities:
                                  drop: ["ALL"]
                              ports:
                                - containerPort: 8000
                              resources:
                                requests:
                                  cpu: "100m"
                                  memory: "128Mi"
                                limits:
                                  cpu: "200m"
                                  memory: "256Mi"
                              readinessProbe:
                                httpGet:
                                  path: /health
                                  port: 8000
                                initialDelaySeconds: 5
                                periodSeconds: 10
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.manifest.spec.selector.matchLabels.app
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.manifest.spec.template.metadata.labels.app
              - type: FromCompositeFieldPath
                fromFieldPath: spec.image
                toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].image
              - type: FromCompositeFieldPath
                fromFieldPath: spec.replicas
                toFieldPath: spec.forProvider.manifest.spec.replicas
              - type: FromCompositeFieldPath
                fromFieldPath: spec.port
                toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].ports[0].containerPort
              - type: FromCompositeFieldPath
                fromFieldPath: spec.port
                toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].readinessProbe.httpGet.port
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resources.cpu
                toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].resources.requests.cpu
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resources.memory
                toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].resources.requests.memory
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resources.cpu
                toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].resources.limits.cpu
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resources.memory
                toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].resources.limits.memory

          - name: service
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: kubernetes-provider
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Service
                    metadata:
                      namespace: apps
                    spec:
                      type: ClusterIP
                      ports:
                        - port: 80
                          targetPort: 8000
                      selector:
                        app: ""
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.manifest.spec.selector.app
              - type: FromCompositeFieldPath
                fromFieldPath: spec.port
                toFieldPath: spec.forProvider.manifest.spec.ports[0].targetPort
