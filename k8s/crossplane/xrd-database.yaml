apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xdatabases.platform.veloxlabs.dev
spec:
  group: platform.veloxlabs.dev
  names:
    kind: XDatabase
    plural: xdatabases
  claimNames:
    kind: Database
    plural: databases
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                engine:
                  type: string
                  enum: ["postgres"]
                  description: Database engine (postgres supported)
                storageSize:
                  type: string
                  default: "1Gi"
                  description: Storage size
              required:
                - engine
