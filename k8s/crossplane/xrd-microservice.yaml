apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xmicroservices.platform.veloxlabs.dev
spec:
  group: platform.veloxlabs.dev
  names:
    kind: XMicroservice
    plural: xmicroservices
  claimNames:
    kind: Microservice
    plural: microservices
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                  description: Container image to deploy
                replicas:
                  type: integer
                  default: 2
                  description: Number of replicas
                port:
                  type: integer
                  default: 8000
                  description: Container port
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                      default: "100m"
                    memory:
                      type: string
                      default: "128Mi"
              required:
                - image
